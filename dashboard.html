<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI | Elite Dashboard</title>
    <style>
        :root { --acc: #00d2ff; --bg: #050505; --card: rgba(255,255,255,0.05); }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        
        /* Glassmorphism Section */
        .section { 
            background: var(--card); backdrop-filter: blur(15px); padding: 40px; 
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.1); 
            margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
        }
        
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, textarea { 
            background: rgba(0,0,0,0.5); border: 1px solid #333; color: #fff; 
            padding: 18px; border-radius: 12px; font-size: 16px; width: 100%; box-sizing: border-box; 
        }
        textarea { grid-column: span 2; }
        input:focus { border-color: var(--acc); outline: none; box-shadow: 0 0 15px var(--acc); }

        /* Portfolio Design - The "Flat-out" Look */
        #portfolioBox { 
            background: #fff; color: #000; padding: 80px; border-radius: 30px; 
            display: none; margin-top: 50px; box-shadow: 0 0 60px rgba(255,255,255,0.1); 
        }
        .port-header { 
            display: flex; align-items: center; gap: 50px; margin-bottom: 60px; 
            border-bottom: 8px solid var(--acc); padding-bottom: 30px; 
        }
        .profile-img { width: 260px; height: 260px; border-radius: 25px; border: 10px solid var(--acc); object-fit: cover; }
        
        .name-title h1 { font-size: 65px; margin: 0; text-transform: uppercase; font-weight: 900; line-height: 1; }
        .name-title p { font-size: 30px; color: #444; margin-top: 10px; font-weight: 600; }
        
        .contact-info { font-size: 20px; color: var(--acc); font-weight: bold; margin-top: 15px; }

        .detail-block { margin-bottom: 50px; }
        .detail-title { font-size: 36px; font-weight: 900; margin-bottom: 5px; text-transform: uppercase; }
        .line { height: 8px; width: 130px; background: var(--acc); margin-bottom: 20px; border-radius: 10px; }
        .detail-content { font-size: 26px; color: #333; font-weight: 500; line-height: 1.6; }
        
        .skill-chip { 
            border: 4px solid #000; padding: 12px 30px; border-radius: 50px; 
            display: inline-block; margin: 8px; font-weight: 900; font-size: 24px; 
        }

        .btn-main { 
            width: 100%; padding: 25px; margin-top: 20px; background: var(--acc); 
            border: none; border-radius: 15px; font-weight: 900; font-size: 24px; 
            cursor: pointer; color: #000; transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-5px); box-shadow: 0 10px 20px var(--acc); }

        @media print { .no-print { display: none; } #portfolioBox { display: block !important; } }
    </style>
</head>
<body>
    <div class="section no-print">
        <h1 style="color:var(--acc); font-size: 45px; letter-spacing: 2px;">🚀 NEXUS AI: ELITE PORTFOLIO BUILDER</h1>
        <div class="input-grid">
            <input type="text" id="pName" placeholder="Full Name (e.g. Aleti Pranav)">
            <input type="text" id="pRole" placeholder="Role (e.g. Python Developer)">
            <input type="text" id="pEmail" placeholder="Email Address">
            <input type="text" id="pPhone" placeholder="Mobile Number">
            <input type="text" id="pLinkedIn" placeholder="LinkedIn Profile Username">
            <input type="text" id="pExpTitle" placeholder="Heading (e.g. EXPERIENCE)">
            <textarea id="pExpDesc" placeholder="Description (As a Software Developer at...)"></textarea>
            <input type="text" id="pEduTitle" placeholder="Heading (e.g. EDUCATION)">
            <textarea id="pEduDesc" placeholder="Description (B.Tech 2nd Year student...)"></textarea>
            <input type="text" id="pSkills" placeholder="Technical Skills (comma separated)">
            <textarea id="pProjects" rows="6" placeholder="Project Details & Links..."></textarea>
        </div>
        <div style="margin-top:25px;">
            <p style="font-weight: bold;">📸 Upload Your Professional Photo:</p>
            <input type="file" id="pPhoto" accept="image/*" onchange="previewImage(event)" style="border:none;">
        </div>
        <button class="btn-main" onclick="generatePortfolio()">INITIALIZE PORTFOLIO ⚡</button>
    </div>

    <div id="portfolioBox">
        <div class="port-header">
            <img id="viewPhoto" class="profile-img" src="">
            <div class="name-title">
                <h1 id="viewName"></h1>
                <p id="viewRole"></p>
                <div class="contact-info" id="viewContact"></div>
            </div>
        </div>

        <div class="detail-block"><div class="detail-title" id="viewExpTitle"></div><div class="line"></div><div class="detail-content" id="viewExpDesc"></div></div>
        <div class="detail-block"><div class="detail-title" id="viewEduTitle"></div><div class="line"></div><div class="detail-content" id="viewEduDesc"></div></div>
        
        <div class="detail-block">
            <div class="detail-title">TECHNICAL MASTERY</div>
            <div class="line"></div>
            <div id="viewSkills"></div>
        </div>

        <div class="detail-block">
            <div class="detail-title">SIGNIFICANT PROJECTS</div>
            <div class="line"></div>
            <div class="detail-content" id="viewProjects" style="white-space: pre-line;"></div>
        </div>

        <button class="btn-main no-print" onclick="window.print()" style="background:#000; color:#fff;">📥 DOWNLOAD ELITE PDF</button>
    </div>

    <script>
        let photoData = "";
        function previewImage(e) { const r = new FileReader(); r.onload = () => photoData = r.result; r.readAsDataURL(e.target.files[0]); }
        
        function generatePortfolio() {
            document.getElementById('viewName').innerText = document.getElementById('pName').value;
            document.getElementById('viewRole').innerText = document.getElementById('pRole').value;
            document.getElementById('viewContact').innerText = `📧 ${document.getElementById('pEmail').value} | 📱 ${document.getElementById('pPhone').value} | 🔗 ${document.getElementById('pLinkedIn').value}`;
            
            document.getElementById('viewExpTitle').innerText = document.getElementById('pExpTitle').value;
            document.getElementById('viewExpDesc').innerText = document.getElementById('pExpDesc').value;
            document.getElementById('viewEduTitle').innerText = document.getElementById('pEduTitle').value;
            document.getElementById('viewEduDesc').innerText = document.getElementById('pEduDesc').value;
            document.getElementById('viewProjects').innerText = document.getElementById('pProjects').value;

            const sc = document.getElementById('viewSkills'); sc.innerHTML = "";
            document.getElementById('pSkills').value.split(',').forEach(s => {
                if(s.trim()){ const sp = document.createElement('span'); sp.className='skill-chip'; sp.innerText=s.trim().toUpperCase(); sc.appendChild(sp); }
            });

            if(photoData) document.getElementById('viewPhoto').src = photoData;
            document.getElementById('portfolioBox').style.display = 'block';
            window.scrollTo({ top: document.getElementById('portfolioBox').offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
