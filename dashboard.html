<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI Dashboard</title>
    <style>
        :root { --acc: #00d2ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; padding: 40px; }
        .section { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #333; margin-bottom: 40px; }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; font-size: 16px; }
        textarea { grid-column: span 2; }
        #portfolioBox { background: #fff; color: #000; padding: 60px; border-radius: 20px; display: none; margin-top: 40px; }
        .port-header { display: flex; align-items: center; gap: 40px; margin-bottom: 50px; border-bottom: 5px solid var(--acc); padding-bottom: 20px; }
        .profile-img { width: 250px; height: 250px; border-radius: 20px; border: 6px solid var(--acc); object-fit: cover; }
        .name-title h1 { font-size: 60px; margin: 0; text-transform: uppercase; }
        .detail-block { margin-bottom: 40px; }
        .detail-title { font-size: 32px; font-weight: 800; margin-bottom: 5px; }
        .line { height: 6px; width: 100px; background: var(--acc); margin-bottom: 15px; }
        .detail-content { font-size: 24px; color: #333; }
        .skill-chip { border: 3px solid #000; padding: 10px 25px; border-radius: 50px; display: inline-block; margin: 5px; font-weight: bold; font-size: 20px; }
        @media print { .no-print { display: none; } #portfolioBox { display: block; position: absolute; top:0; left:0; width:100%; } }
    </style>
</head>
<body>
    <div class="section">
        <h1 style="color:var(--acc)">🚀 Nexus AI: Portfolio Suite</h1>
        <div class="input-grid">
            <input type="text" id="pName" placeholder="Full Name">
            <input type="text" id="pRole" placeholder="Role (e.g. Python Developer)">
            <input type="text" id="pEmail" placeholder="Email Address">
            <input type="text" id="pPhone" placeholder="Mobile Number">
            <input type="text" id="pLinkedIn" placeholder="LinkedIn Profile">
            <input type="text" id="pExpTitle" placeholder="Heading (e.g. EXPERIENCE)">
            <textarea id="pExpDesc" placeholder="Description (e.g. As a Developer...)"></textarea>
            <input type="text" id="pEduTitle" placeholder="Heading (e.g. EDUCATION)">
            <textarea id="pEduDesc" placeholder="Description (e.g. B.Tech Graduate)"></textarea>
            <input type="text" id="pSkills" placeholder="Skills (comma separated)">
            <textarea id="pProjects" placeholder="Project Details"></textarea>
        </div>
        <input type="file" id="pPhoto" accept="image/*" onchange="previewImage(event)" style="margin-top:20px;">
        <button onclick="generatePortfolio()" style="width:100%; padding:20px; margin-top:20px; background:var(--acc); border:none; border-radius:10px; font-weight:bold; cursor:pointer; font-size:20px;">BUILD ELITE PORTFOLIO ⚡</button>
    </div>

    <div id="portfolioBox">
        <div class="port-header">
            <img id="viewPhoto" class="profile-img" src="">
            <div class="name-title">
                <h1 id="viewName"></h1>
                <p id="viewRole" style="font-size:28px; color:#444;"></p>
                <p style="font-size:18px; color:var(--acc);" id="viewContact"></p>
            </div>
        </div>
        <div class="detail-block"><div class="detail-title" id="viewExpTitle"></div><div class="line"></div><div class="detail-content" id="viewExpDesc"></div></div>
        <div class="detail-block"><div class="detail-title" id="viewEduTitle"></div><div class="line"></div><div class="detail-content" id="viewEduDesc"></div></div>
        <div class="detail-block"><div class="detail-title">TECHNICAL SKILLS</div><div class="line"></div><div id="viewSkills"></div></div>
        <div class="detail-block"><div class="detail-title">PROJECT SHOWCASE</div><div class="line"></div><div class="detail-content" id="viewProjects" style="white-space: pre-line;"></div></div>
        <button class="no-print" onclick="window.print()" style="width:100%; padding:20px; background:#000; color:#fff; border-radius:10px; cursor:pointer; font-size:20px;">DOWNLOAD PROFESSIONAL PDF</button>
    </div>

    <script>
        let photoData = "";
        function previewImage(e) { const r = new FileReader(); r.onload = () => photoData = r.result; r.readAsDataURL(e.target.files[0]); }
        function generatePortfolio() {
            document.getElementById('viewName').innerText = document.getElementById('pName').value;
            document.getElementById('viewRole').innerText = document.getElementById('pRole').value;
            document.getElementById('viewContact').innerText = `📧 ${document.getElementById('pEmail').value} | 📱 ${document.getElementById('pPhone').value} | 🔗 ${document.getElementById('pLinkedIn').value}`;
            document.getElementById('viewExpTitle').innerText = document.getElementById('pExpTitle').value;
            document.getElementById('viewExpDesc').innerText = document.getElementById('pExpDesc').value;
            document.getElementById('viewEduTitle').innerText = document.getElementById('pEduTitle').value;
            document.getElementById('viewEduDesc').innerText = document.getElementById('pEduDesc').value;
            document.getElementById('viewProjects').innerText = document.getElementById('pProjects').value;
            const sc = document.getElementById('viewSkills'); sc.innerHTML = "";
            document.getElementById('pSkills').value.split(',').forEach(s => {
                if(s.trim()){ const sp = document.createElement('span'); sp.className='skill-chip'; sp.innerText=s.trim().toUpperCase(); sc.appendChild(sp); }
            });
            if(photoData) document.getElementById('viewPhoto').src = photoData;
            document.getElementById('portfolioBox').style.display = 'block';
            window.scrollTo({ top: document.getElementById('portfolioBox').offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
