<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Nexus AI Dashboard</title>
    <style>
        :root { --acc: #00d2ff; --bg: #050505; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', sans-serif; padding: 40px; margin: 0; }
        .section { background: rgba(255,255,255,0.05); padding: 40px; border-radius: 20px; border: 1px solid #333; margin-bottom: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .input-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        input, textarea { background: #111; border: 1px solid #333; color: #fff; padding: 15px; border-radius: 10px; font-size: 16px; width: 100%; box-sizing: border-box; }
        textarea { grid-column: span 2; }
        #portfolioBox { background: #fff; color: #000; padding: 80px; border-radius: 30px; display: none; margin-top: 50px; box-shadow: 0 0 50px rgba(255,255,255,0.1); }
        .port-header { display: flex; align-items: center; gap: 50px; margin-bottom: 60px; border-bottom: 6px solid var(--acc); padding-bottom: 30px; }
        .profile-img { width: 250px; height: 250px; border-radius: 20px; border: 8px solid var(--acc); object-fit: cover; }
        .name-title h1 { font-size: 60px; margin: 0; text-transform: uppercase; font-weight: 900; }
        .detail-block { margin-bottom: 50px; }
        .detail-title { font-size: 34px; font-weight: 800; margin-bottom: 5px; color: #000; }
        .line { height: 8px; width: 120px; background: var(--acc); margin-bottom: 15px; }
        .detail-content { font-size: 26px; color: #333; font-weight: 500; }
        .skill-chip { border: 3px solid #000; padding: 12px 30px; border-radius: 50px; display: inline-block; margin: 5px; font-weight: 900; font-size: 22px; }
        .btn-main { width: 100%; padding: 25px; margin-top: 20px; background: var(--acc); border: none; border-radius: 15px; font-weight: bold; font-size: 22px; cursor: pointer; color: #000; }
        @media print { .no-print { display: none; } #portfolioBox { display: block; position: absolute; top:0; left:0; width:100%; box-shadow: none; } }
    </style>
</head>
<body>
    <div class="section">
        <h1 style="color:var(--acc); font-size: 40px;">🚀 NEXUS AI: ELITE DASHBOARD</h1>
        <div class="input-grid">
            <input type="text" id="pName" placeholder="Full Name (e.g. Aleti Pranav)">
            <input type="text" id="pRole" placeholder="Role (e.g. Developer)">
            <input type="text" id="pEmail" placeholder="Email Address">
            <input type="text" id="pPhone" placeholder="Mobile Number">
            <input type="text" id="pLinkedIn" placeholder="LinkedIn Profile Link">
            <input type="text" id="pExpTitle" placeholder="Heading (e.g. EXPERIENCE)">
            <textarea id="pExpDesc" placeholder="Description (As a Python Developer...)"></textarea>
            <input type="text" id="pEduTitle" placeholder="Heading (e.g. EDUCATION)">
            <textarea id="pEduDesc" placeholder="Description (B.Tech student at CJITS)"></textarea>
            <input type="text" id="pSkills" placeholder="Skills (Python, AI, React)">
            <textarea id="pProjects" rows="5" placeholder="Featured Projects details..."></textarea>
        </div>
        <div style="margin-top:20px;">
            <p>📸 Upload High-Res Profile Photo:</p>
            <input type="file" id="pPhoto" accept="image/*" onchange="previewImage(event)" style="border:none; background:none;">
        </div>
        <button class="btn-main" onclick="generatePortfolio()">BUILD MASTERPIECE PORTFOLIO ⚡</button>
    </div>

    <div id="portfolioBox">
        <div class="port-header">
            <img id="viewPhoto" class="profile-img" src="">
            <div class="name-title">
                <h1 id="viewName"></h1>
                <p id="viewRole" style="font-size:32px; color:#555;"></p>
                <p style="font-size:20px; color:var(--acc);" id="viewContact"></p>
            </div>
        </div>
        <div class="detail-block"><div class="detail-title" id="viewExpTitle"></div><div class="line"></div><div class="detail-content" id="viewExpDesc"></div></div>
        <div class="detail-block"><div class="detail-title" id="viewEduTitle"></div><div class="line"></div><div class="detail-content" id="viewEduDesc"></div></div>
        <div class="detail-block"><div class="detail-title">TECHNICAL MASTERY</div><div class="line"></div><div id="viewSkills"></div></div>
        <div class="detail-block"><div class="detail-title">PROJECT SHOWCASE</div><div class="line"></div><div class="detail-content" id="viewProjects" style="white-space: pre-line;"></div></div>
        <button class="btn-main no-print" onclick="window.print()" style="background:#000; color:#fff;">📥 DOWNLOAD ELITE PDF</button>
    </div>

    <script>
        let photoData = "";
        function previewImage(e) { const r = new FileReader(); r.onload = () => photoData = r.result; r.readAsDataURL(e.target.files[0]); }
        function generatePortfolio() {
            document.getElementById('viewName').innerText = document.getElementById('pName').value;
            document.getElementById('viewRole').innerText = document.getElementById('pRole').value;
            document.getElementById('viewContact').innerText = `📧 ${document.getElementById('pEmail').value} | 📱 ${document.getElementById('pPhone').value} | 🔗 LinkedIn Profile`;
            document.getElementById('viewExpTitle').innerText = document.getElementById('pExpTitle').value;
            document.getElementById('viewExpDesc').innerText = document.getElementById('pExpDesc').value;
            document.getElementById('viewEduTitle').innerText = document.getElementById('pEduTitle').value;
            document.getElementById('viewEduDesc').innerText = document.getElementById('pEduDesc').value;
            document.getElementById('viewProjects').innerText = document.getElementById('pProjects').value;
            const sc = document.getElementById('viewSkills'); sc.innerHTML = "";
            document.getElementById('pSkills').value.split(',').forEach(s => {
                if(s.trim()){ const sp = document.createElement('span'); sp.className='skill-chip'; sp.innerText=s.trim().toUpperCase(); sc.appendChild(sp); }
            });
            if(photoData) document.getElementById('viewPhoto').src = photoData;
            document.getElementById('portfolioBox').style.display = 'block';
            window.scrollTo({ top: document.getElementById('portfolioBox').offsetTop, behavior: 'smooth' });
        }
    </script>
</body>
</html>
