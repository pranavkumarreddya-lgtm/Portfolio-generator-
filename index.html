<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus AI | Secure Portal</title>
    <style>
        /* Modern Elite Styling */
        :root { --primary: #00d2ff; --secondary: #3a7bd5; --bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        /* Animated Floating Background */
        .bg-circles { position: absolute; width: 100%; height: 100%; overflow: hidden; z-index: 1; }
        .circle { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.4; animation: float 10s infinite alternate; }
        .c1 { width: 400px; height: 400px; background: var(--primary); top: -10%; left: -10%; }
        .c2 { width: 350px; height: 350px; background: var(--secondary); bottom: -10%; right: -10%; animation-delay: 2s; }
        @keyframes float { from { transform: translateY(0); } to { transform: translateY(50px); } }

        /* Premium Glass Card */
        .login-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 50px 40px;
            border-radius: 30px;
            width: 400px;
            text-align: center;
            z-index: 1000;
            position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transition: 1s ease-in-out;
        }
        .icon-header { font-size: 50px; margin-bottom: 15px; }
        .welcome-text { font-size: 36px; font-weight: 900; letter-spacing: 6px; color: #fff; margin-bottom: 5px; }
        .subtitle { font-size: 11px; color: var(--primary); margin-bottom: 35px; font-weight: bold; letter-spacing: 2px; }

        /* Stylish Inputs */
        .inp-group { margin-bottom: 20px; text-align: left; }
        .inp {
            width: 100%; padding: 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.4); color: white; font-size: 16px; outline: none; transition: 0.3s;
        }
        .inp:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0, 210, 255, 0.3); }

        /* Captcha Styling */
        .captcha-box {
            display: flex; justify-content: space-between; align-items: center;
            background: rgba(255,255,255,0.05); padding: 12px 20px; border-radius: 12px; margin-bottom: 15px;
        }
        #captcha-code { font-size: 24px; font-weight: 900; letter-spacing: 8px; color: var(--primary); }
        
        .login-btn {
            width: 100%; padding: 20px; border-radius: 15px; border: none;
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            color: white; font-weight: 900; font-size: 18px; cursor: pointer; transition: 0.4s;
            box-shadow: 0 10px 20px rgba(0, 210, 255, 0.2);
        }
        .login-btn:hover { transform: scale(1.03); box-shadow: 0 0 30px var(--primary); }

        /* Cinematic Doors */
        .door { position: fixed; top: 0; width: 50%; height: 100%; background: #0a0a0a; z-index: 5000; transition: 2.5s cubic-bezier(.7,0,.3,1); border: 2px solid #111; }
        .left-door { left: 0; } .right-door { right: 0; }
        .open-left { transform: translateX(-100%) rotateY(-20deg); }
        .open-right { transform: translateX(100%) rotateY(20deg); }
        
        .person-silhouette { position: fixed; bottom: -200px; left: 50%; transform: translateX(-50%); width: 80px; height: 160px; background: #000; border-radius: 40px 40px 0 0; opacity: 0; z-index: 4000; transition: 2.5s; }
        .enter-person { bottom: 30%; opacity: 1; }
    </style>
</head>
<body>
    <div class="bg-circles">
        <div class="circle c1"></div>
        <div class="circle c2"></div>
    </div>

    <div id="door-container">
        <div class="door left-door"></div>
        <div class="door right-door"></div>
        <div class="person-silhouette" id="person"></div>
    </div>

    <div class="login-card" id="login-form">
        <div class="icon-header">🛡️</div>
        <h2 class="welcome-text">WELCOME</h2>
        <p class="subtitle">NEXUS AI AUTONOMOUS SYSTEM</p>
        
        <div class="inp-group">
            <input type="text" id="username" placeholder="👤 Identity Name" class="inp">
        </div>
        
        <div class="captcha-box">
            <span id="captcha-code">----</span>
            <button style="background:none; border:none; cursor:pointer; font-size:20px;" onclick="generateCaptcha()">🔄</button>
        </div>
        
        <div class="inp-group">
            <input type="text" id="captcha-input" placeholder="🔢 Verify Captcha" class="inp">
        </div>
        
        <button class="login-btn" onclick="handleLogin()">INITIALIZE ACCESS ⚡</button>
    </div>

    <script>
        function generateCaptcha() {
            const code = Math.random().toString(36).substring(2, 7).toUpperCase();
            document.getElementById('captcha-code').innerText = code;
        }

        function handleLogin() {
            const user = document.getElementById('username').value;
            const input = document.getElementById('captcha-input').value;
            const code = document.getElementById('captcha-code').innerText;

            if (user.trim() !== "" && input === code) {
                document.querySelector('.left-door').classList.add('open-left');
                document.querySelector('.right-door').classList.add('open-right');
                document.getElementById('person').classList.add('enter-person');
                document.getElementById('login-form').style.opacity = '0';
                document.getElementById('login-form').style.transform = 'scale(0.8)';
                
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 2800);
            } else {
                alert("ACCESS DENIED: Credentials Mismatch");
                generateCaptcha();
            }
        }
        window.onload = generateCaptcha;
    </script>
</body>
</html>
